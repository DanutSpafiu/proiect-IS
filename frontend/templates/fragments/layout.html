<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Magazin Online</title>
    <link rel="stylesheet" href="/css/app.css"/>
    <link rel="icon" href="data:,"/>
</head>
<body>

<!-- ============ Top bar ============ -->
<header th:fragment="topbar" class="topbar">
    <div class="topbar__in">
        <a class="brand" href="/">Magazin Online</a>
        <form class="topbar__search" id="searchForm" onsubmit="return false">
            <input id="searchInput" type="search" placeholder="Search products..." autocomplete="off"/>
        </form>
        <nav class="nav" id="navAuth"><!-- filled by app.js --></nav>
    </div>
</header>

<!-- ============ Footer ============ -->
<footer th:fragment="footer" class="foot">
    Magazin Online — buy fixed-price goods or negotiate the price. Prices in RON.
</footer>

</body>
</html>
