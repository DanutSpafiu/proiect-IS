<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">MERIDIAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<body>

<!-- ============ Top bar ============ -->

        <a class="brand" href="/">
            <span class="brand__mark">MERI<b>·</b>DIAN</span>
            <span class="brand__sub">online marketplace</span>

        <nav class="nav" id="navAuth"><!-- filled by app.js --></nav>

    <div class="wrap foot__in">
        <span class="brand__mark" style="font-size:1.1rem">MERI<b style="color:var(--accent)">·</b>DIAN</span>
        <span class="foot__note">a trading floor for fixed &amp; negotiated lots · est. MMXXVI</span>

</html>
