<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('MERIDIAN — sign in')}"></head>
<body data-page="auth">

<header th:replace="~{fragments/layout :: topbar}"></header>

<main class="wrap">
    <div class="auth-shell">
        <span class="eyebrow">access</span>
        <h1 style="font-size:2.6rem;margin:.3rem 0 1.6rem">Step up to the <span class="serif-italic" style="color:var(--accent)">counter</span>.</h1>

        <div class="panel">
            <div class="tabs">
                <button class="active" data-tab="login">Sign in</button>
                <button data-tab="register">Create account</button>
            </div>

            <!-- Login -->
            <form id="loginForm">
                <div class="field">
                    <label>Email</label>
                    <input name="email" type="email" required autocomplete="email" placeholder="you@example.com"/>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input name="password" type="password" required autocomplete="current-password" placeholder="••••••"/>
                </div>
                <button class="btn btn--accent" type="submit" style="width:100%;justify-content:center">Sign in</button>
            </form>

            <!-- Register -->
            <form id="regForm" style="display:none">
                <div class="field">
                    <label>I am registering as</label>
                    <div class="role-toggle">
                        <label><input type="radio" name="role" value="buyer" checked/><span>Buyer</span></label>
                        <label><input type="radio" name="role" value="seller"/><span>Seller</span></label>
                    </div>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input name="email" type="email" required autocomplete="email" placeholder="you@example.com"/>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input name="password" type="password" required minlength="4" autocomplete="new-password" placeholder="at least 4 characters"/>
                </div>
                <button class="btn btn--accent" type="submit" style="width:100%;justify-content:center">Create account</button>
                <p class="foot__note" style="margin-top:1rem;line-height:1.6">
                    Buyers are active immediately. Seller accounts must be approved by an administrator before listing.
                </p>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
