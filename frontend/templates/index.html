<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Magazin Online')}"></head>
<body data-page="index">

<header th:replace="~{fragments/layout :: topbar}"></header>

<main class="wrap">

    <h1>Products</h1>

    <div class="toolbar">
        <div class="filters" id="filters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="FIXED_PRICE">Fixed price</button>
            <button class="chip" data-filter="NEGOTIABLE">Negotiable</button>
        </div>
        <span class="count" id="catCount">loading...</span>
    </div>

    <ul class="grid" id="catalogue"><!-- filled by app.js --></ul>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
