spring.application.name=MagazinOnline

# --- H2 in-memory database (development) ---
spring.datasource.url=jdbc:h2:mem:magazinonline;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console at http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT (login) ---
# Secret must be at least 256 bits (32 chars) for the HS256 signing algorithm.
# Override in production via an environment variable / external config.
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes-please}
# Token lifetime in milliseconds (default: 24h).
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}